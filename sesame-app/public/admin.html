<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin — Sésame Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fc; --card: #fff; --text: #0f0f1a; --muted: #8080a0;
  --accent: #06d6f5; --border: #e8e8f0; --green: #059669; --red: #ef4444;
}
body {
  font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
  padding: 24px; padding-top: max(24px, env(safe-area-inset-top));
  min-height: 100vh;
}
.container { max-width: 800px; margin: 0 auto; }
h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
.back-link { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; display: inline-block; margin-bottom: 20px; }
.back-link:hover { text-decoration: underline; }

/* Stats cards */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 20px; text-align: center;
}
.stat-num { font-size: 32px; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

/* Create ambassador */
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.create-form {
  display: flex; gap: 10px; margin-bottom: 28px;
}
.create-form input {
  flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
  font-family: 'Sora', sans-serif; font-size: 14px; background: var(--card);
  outline: none; transition: border 0.2s;
}
.create-form input:focus { border-color: var(--accent); }
.create-form input::placeholder { color: #c0c0d0; }
.btn-create {
  padding: 12px 20px; background: var(--accent); color: #fff; border: none;
  border-radius: 12px; font-family: 'Sora', sans-serif; font-size: 14px;
  font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(6,214,245,0.3); }

/* Generated link banner */
.link-banner {
  display: none; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 12px;
  padding: 14px 18px; margin-bottom: 24px; align-items: center; gap: 12px;
}
.link-banner.visible { display: flex; }
.link-banner .link-text {
  flex: 1; font-size: 13px; color: var(--green); font-weight: 600;
  word-break: break-all;
}
.link-banner .btn-copy {
  padding: 8px 16px; background: var(--green); color: #fff; border: none;
  border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 12px;
  font-weight: 700; cursor: pointer; white-space: nowrap;
}
.link-banner .btn-copy:hover { opacity: 0.9; }

/* Ambassador groups */
.ref-group { margin-bottom: 12px; }
.ref-group-header {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; cursor: pointer; transition: background 0.2s;
}
.ref-group-header:hover { background: #f0f2f8; }
.ref-group-left { display: flex; align-items: center; gap: 12px; }
.ref-code { font-weight: 700; color: var(--accent); font-size: 15px; }
.ref-count { color: var(--muted); font-size: 12px; }
.ref-paid-count { color: var(--green); font-size: 12px; font-weight: 600; }
.ref-actions { display: flex; gap: 8px; align-items: center; }
.btn-small {
  font-size: 11px; color: var(--muted); background: #f0f2f8; padding: 5px 12px;
  border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
  font-family: 'Sora', sans-serif; transition: background 0.2s;
}
.btn-small:hover { background: #e0e4f0; }

/* User rows inside group */
.ref-users {
  overflow: hidden; max-height: 0; transition: max-height 0.3s ease;
  padding: 0 4px;
}
.ref-users.open { max-height: 1000px; }
.ref-user {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px; font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.ref-user:last-child { border-bottom: none; }
.ref-user .email { flex: 1; word-break: break-all; }
.ref-user .date { color: var(--muted); font-size: 11px; margin: 0 12px; white-space: nowrap; }
.ref-user-details { padding: 4px 18px 10px; }
.ref-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.ref-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: #f0f2f8; color: var(--muted); border: 1px solid var(--border);
}
.ref-tag.last { background: #fef3c7; color: #92400e; border-color: #f59e0b; font-weight: 600; }
/* Toggle paid button */
.btn-toggle {
  padding: 6px 14px; border-radius: 20px; border: none;
  font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; min-width: 80px;
}
.btn-toggle.is-paid {
  background: #ecfdf5; color: var(--green); border: 1px solid #a7f3d0;
}
.btn-toggle.is-paid:hover { background: #fef2f2; color: var(--red); border-color: #fca5a5; }
.btn-toggle.not-paid {
  background: #fef2f2; color: var(--red); border: 1px solid #fca5a5;
}
.btn-toggle.not-paid:hover { background: #ecfdf5; color: var(--green); border-color: #a7f3d0; }
.btn-toggle:disabled { opacity: 0.5; cursor: wait; }

/* Not admin / loading */
.not-admin { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
.not-admin a { color: var(--accent); }
.loading { text-align: center; padding: 40px; color: var(--muted); }
.empty { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

/* Login button */
.btn-google-admin {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 24px; margin-top: 16px;
  background: #fff; border: 1px solid var(--border); border-radius: 12px;
  font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text); cursor: pointer; transition: all 0.2s;
}
.btn-google-admin:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.btn-google-admin svg { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="/">&larr; Retour au dashboard</a>
  <h1>Tableau de bord admin</h1>
  <div class="subtitle">Suivi des inscriptions et referrals</div>

  <div id="content">
    <div class="loading">Chargement...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gkcxenxcyybgwdsgsuep.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrY3hlbnhjeXliZ3dkc2dzdWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjcyMjMsImV4cCI6MjA4OTUwMzIyM30.fSS4MJpilWlfVyu6uPUKK-cWhO3S5KA_NUkKFLRPiBo';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allProfiles = [];
let allAmbassadors = [];
let allRefLogs = [];
let currentAdminId = null;
const baseUrl = window.location.origin;

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/admin.html' }
  });
  if (error) alert('Erreur : ' + error.message);
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) {
    document.getElementById('content').innerHTML = `
      <div class="not-admin">
        Connecte-toi pour accéder au dashboard admin
        <br>
        <button class="btn-google-admin" onclick="loginGoogle()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continuer avec Google
        </button>
      </div>`;
    return;
  }

  const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', session.user.id).maybeSingle();
  if (!profile?.is_admin) {
    document.getElementById('content').innerHTML = '<div class="not-admin">Accès réservé aux administrateurs</div>';
    return;
  }
  currentAdminId = session.user.id;

  // Load profiles, ambassadors, and referral logs in parallel
  const [profilesRes, ambassadorsRes, logsRes] = await Promise.all([
    sb.rpc('admin_get_profiles'),
    sb.from('ambassadors').select('*').order('created_at', { ascending: false }),
    sb.rpc('admin_get_referral_logs')
  ]);

  if (profilesRes.error) {
    document.getElementById('content').innerHTML = `<div class="not-admin">Erreur: ${profilesRes.error.message}</div>`;
    return;
  }

  allProfiles = profilesRes.data;
  allAmbassadors = ambassadorsRes.data || [];
  allRefLogs = logsRes.data || [];
  render();
}

function render() {
  const total = allProfiles.length;
  const paid = allProfiles.filter(p => p.paid).length;
  const referred = allProfiles.filter(p => p.referred_by).length;

  // Group profiles by referral code
  const groups = {};
  allProfiles.forEach(p => {
    const key = p.referred_by || '__direct__';
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  // Merge: all ambassador codes (even those with 0 signups)
  const allCodes = [...new Set([
    ...allAmbassadors.map(a => a.code),
    ...allProfiles.filter(p => p.referred_by).map(p => p.referred_by)
  ])];

  // Sort by most signups (desc), then alphabetically
  allCodes.sort((a, b) => (groups[b]?.length || 0) - (groups[a]?.length || 0) || a.localeCompare(b));

  let html = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Inscrits</div></div>
      <div class="stat-card"><div class="stat-num">${paid}</div><div class="stat-label">Payés</div></div>
      <div class="stat-card"><div class="stat-num">${referred}</div><div class="stat-label">Via referral</div></div>
      <div class="stat-card"><div class="stat-num">${allCodes.length}</div><div class="stat-label">Ambassadeurs</div></div>
    </div>

    <div class="section-title">Créer un ambassadeur</div>
    <div class="create-form">
      <input type="text" id="ref-name" placeholder="Nom de l'ami (ex: marc, sarah, classe-tle)" />
      <button class="btn-create" onclick="createLink()">Créer</button>
    </div>
    <div class="link-banner" id="link-banner">
      <span class="link-text" id="link-text"></span>
      <button class="btn-copy" id="btn-copy" onclick="copyLink()">Copier</button>
    </div>

    <div class="section-title">Ambassadeurs</div>
  `;

  if (allCodes.length === 0) {
    html += '<div class="empty">Aucun ambassadeur — crée ton premier lien ci-dessus</div>';
  }

  allCodes.forEach(code => {
    const users = groups[code] || [];
    const paidCount = users.filter(u => u.paid).length;
    // Find ambassador name
    const amb = allAmbassadors.find(a => a.code === code);
    const label = amb ? amb.name : code;
    html += renderGroup(code, label, users, paidCount);
  });

  // Direct users (no referral)
  const direct = groups['__direct__'] || [];
  if (direct.length) {
    const directPaid = direct.filter(u => u.paid).length;
    html += renderGroup('__direct__', 'Directs (sans referral)', direct, directPaid, true);
  }

  document.getElementById('content').innerHTML = html;
}

function renderGroup(id, label, users, paidCount, isDirect) {
  const safeId = id.replace(/[^a-zA-Z0-9_-]/g, '_');
  const showCode = !isDirect && label !== id;
  return `
    <div class="ref-group">
      <div class="ref-group-header" onclick="toggleGroup('${safeId}')">
        <div class="ref-group-left">
          <span class="ref-code" ${isDirect ? 'style="color: var(--muted)"' : ''}>${label}</span>
          ${showCode ? `<span style="color:var(--muted);font-size:11px">(${id})</span>` : ''}
          <span class="ref-count">${users.length} inscrit${users.length > 1 ? 's' : ''}</span>
          <span class="ref-paid-count">${paidCount} payé${paidCount > 1 ? 's' : ''}</span>
        </div>
        <div class="ref-actions">
          ${!isDirect ? `<button class="btn-small" onclick="event.stopPropagation(); copyRefLink('${id}', this)">Copier lien</button>` : ''}
        </div>
      </div>
      <div class="ref-users" id="group-${safeId}">
        ${users.length === 0 ? '<div style="padding:12px 18px;color:var(--muted);font-size:12px">Aucun inscrit pour le moment</div>' : ''}
        ${users.map(u => {
          const isMe = u.id === currentAdminId;
          // Get referral history for this user
          const userLogs = allRefLogs.filter(l => l.user_id === u.id).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
          const lastLog = userLogs.length > 0 ? userLogs[userLogs.length - 1] : null;
          return `
          <div>
            <div class="ref-user">
              <span class="email">${u.email}${u.is_admin ? ' <span style="font-size:10px;color:var(--accent);font-weight:700">ADMIN</span>' : ''}</span>
              <span class="date">${new Date(u.created_at).toLocaleDateString('fr-FR')}</span>
              ${isMe
                ? '<span style="font-size:11px;color:var(--muted);font-weight:600">Admin</span>'
                : '<button class="btn-toggle ' + (u.paid ? 'is-paid' : 'not-paid') + '" id="toggle-' + u.id + '" onclick="togglePaid(\'' + u.id + '\', ' + u.paid + ', \'' + u.email + '\')">' + (u.paid ? 'Payé' : 'Non payé') + '</button>'
              }
            </div>
            ${userLogs.length > 1 ? '<div class="ref-user-details"><div class="ref-tags">' +
              userLogs.map((l, i) =>
                '<span class="ref-tag' + (i === userLogs.length - 1 ? ' last' : '') + '">' + l.ref_code + ' · ' + new Date(l.created_at).toLocaleDateString('fr-FR') + (i === userLogs.length - 1 ? ' (dernier)' : '') + '</span>'
              ).join('') +
            '</div></div>' : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function toggleGroup(id) {
  const el = document.getElementById('group-' + id);
  if (el) el.classList.toggle('open');
}

async function createLink() {
  const input = document.getElementById('ref-name');
  const rawName = input.value.trim();
  const code = rawName.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9_-]/g, '');
  if (!code) { input.focus(); return; }

  // Check if already exists
  if (allAmbassadors.find(a => a.code === code)) {
    const link = `${baseUrl}/?ref=${code}`;
    document.getElementById('link-text').textContent = link;
    document.getElementById('link-banner').classList.add('visible');
    navigator.clipboard.writeText(link);
    document.getElementById('btn-copy').textContent = 'Copié !';
    setTimeout(() => document.getElementById('btn-copy').textContent = 'Copier', 2000);
    input.value = '';
    return;
  }

  // Save to Supabase
  const { error } = await sb.from('ambassadors').insert({ code, name: rawName });
  if (error) { alert('Erreur : ' + error.message); return; }

  // Add to local list and re-render
  allAmbassadors.push({ code, name: rawName, created_at: new Date().toISOString() });
  render();

  // Show link
  const link = `${baseUrl}/?ref=${code}`;
  document.getElementById('link-text').textContent = link;
  document.getElementById('link-banner').classList.add('visible');
  input.value = '';

  navigator.clipboard.writeText(link).then(() => {
    document.getElementById('btn-copy').textContent = 'Copié !';
    setTimeout(() => document.getElementById('btn-copy').textContent = 'Copier', 2000);
  });
}

async function togglePaid(userId, currentPaid, email) {
  // Block self-modification
  if (userId === currentAdminId) return;

  const btn = document.getElementById('toggle-' + userId);
  const newPaid = !currentPaid;
  const action = newPaid ? 'activer' : 'retirer';

  // Confirmation
  if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} l'accès payé pour ${email} ?`)) return;

  btn.disabled = true;
  btn.textContent = '...';

  // Write
  const { error } = await sb.from('profiles').update({ paid: newPaid }).eq('id', userId);
  if (error) {
    alert('Erreur : ' + error.message);
    btn.disabled = false;
    btn.textContent = currentPaid ? 'Payé' : 'Non payé';
    return;
  }

  // Verify — re-read from Supabase to confirm
  const { data: check } = await sb.rpc('admin_get_profiles');
  if (check) {
    const verified = check.find(p => p.id === userId);
    if (verified && verified.paid !== newPaid) {
      alert('La mise à jour n\'a pas été enregistrée. Réessaie.');
      btn.disabled = false;
      btn.textContent = currentPaid ? 'Payé' : 'Non payé';
      return;
    }
    // Refresh all data
    allProfiles = check;
  } else {
    // Fallback: update local
    const profile = allProfiles.find(p => p.id === userId);
    if (profile) profile.paid = newPaid;
  }

  render();
}

function copyRefLink(code, btn) {
  const link = `${baseUrl}/?ref=${code}`;
  navigator.clipboard.writeText(link).then(() => {
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier lien', 1500);
  });
}

function copyLink() {
  const link = document.getElementById('link-text').textContent;
  navigator.clipboard.writeText(link).then(() => {
    document.getElementById('btn-copy').textContent = 'Copié !';
    setTimeout(() => document.getElementById('btn-copy').textContent = 'Copier', 2000);
  });
}

init();
</script>
</body>
</html>
